name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements-dev.txt') }}
      - run: pip install black flake8 isort
      - run: black api/ ml/ tests/ experiments/ scripts/
      - run: isort api/ ml/ tests/ experiments/ scripts/
      - run: flake8 api/ ml/ tests/ experiments/ scripts/ --max-line-length=100 --extend-ignore=E203,W503

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements*.txt') }}
      - name: Install CPU torch
        run: pip install torch==2.2.0 --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short -x

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t fakenews-api:test .
      - name: Start stack
        run: docker compose up -d api
      - name: Wait for API
        run: |
          for i in {1..12}; do
            curl -sf http://localhost:8000/health && break || sleep 5
          done
      - name: Smoke test
        run: curl -sf http://localhost:8000/health
      - name: Teardown
        if: always()
        run: docker compose down
